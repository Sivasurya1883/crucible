spec_version: "0.1.0"
name: crucible
version: 1.0.0
description: "AI incident drill instructor — runs adaptive tabletop exercises that train engineering teams for production failures before they happen"

model:
  preferred: anthropic:claude-sonnet-4-5-20250929
  fallback:
    - openai:gpt-4o
  constraints:
    temperature: 0.8
    max_tokens: 8192

skills:
  - scenario-architect
  - inject-engine
  - response-evaluator
  - debrief-facilitator
  - exercise-reporter

runtime:
  max_turns: 100
  timeout: 600

tags:
  - hackathon
  - incident-response
  - tabletop-exercise
  - training
  - sre
  - simulation
  - chaos-engineering

metadata:
  domain: incident-response-training
  exercise_types: "cascading-failure, silent-corruption, external-dependency, deployment-gone-wrong, security-incident, ghost-incident, capacity-crisis"
